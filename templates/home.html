<!doctype html>
<html lang="en" x-data="{darkMode:false}" :class="{'dark':darkMode}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TikTok</title>
    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="../static/images/favicon.ico"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      [x-cloak] {
        display: none !important;
      }
      body {
        @apply font-light;
      }
      h1 {
        @apply text-[2rem] font-bold;
      }
      h2 {
        @apply text-[1.2rem] font-bold;
      }
      .input-field {
        @apply w-full bg-gray-200 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none;
      }
      .button {
        @apply px-3 py-2 w-full bg-neutral-200 rounded-lg cursor-pointer text-sm font-medium select-none;
      }
      .button-active {
        @apply bg-rose-500 text-white hover:bg-rose-600;
      }
      .button-nav {
        @apply h-full rounded-md h-10 hover:bg-neutral-100 flex items-center px-1 cursor-pointer;
      }

      .button-rounded {
        @apply w-full rounded-full h-10 hover:bg-neutral-100 flex items-center justify-between px-2 cursor-pointer;
      }

      .button-nav span {
        @apply ml-3 font-medium  hidden lg:block whitespace-nowrap transition duration-300;
      }

      .button-article {
        @apply rounded-full size-13 bg-neutral-100 hover:bg-neutral-200 flex items-center justify-center transition-all duration-300 ease-in-out;
      }
      input[type="search"]::-webkit-search-cancel-button {
        -webkit-appearance: none;
        appearance: none;
      }
    </style>
    <link rel="stylesheet" href="../static/css/style.css" />
  </head>
  <body
    class="dark:bg-black dark:text-white dark:fill-white"
    x-data="{showDrawer: false, searchQuery:'', searchShow:false, showMore:false,showColorModes:false,resetAll(){
      this.searchShow=false;
      this.showMore=false;
      this.showColorModes=false;
    }}"
  >
    <div class="min-h-[100dvh]">
      <aside
        class="fixed h-screen w-18 lg:w-74 border-r border-neutral-200 dark:border-neutral-800 lg:border-none transition-all duration-300 ease-in-out"
        :class="{'!w-18':showDrawer}"
      >
        <nav class="relative h-full bg-white dark:bg-black z-10">
          <div id="logo" class="pl-4.5 pt-5 mb-3 w-max">
            <a href="">
              <div class="" x-show="darkMode">
                <img
                  src="../static/images/tiktok_dark.png"
                  alt=""
                  class="hidden lg:block"
                  :class="{'!hidden':showDrawer}"
                />
                <img
                  src="../static/images/icon_dark.png"
                  alt=""
                  class="block lg:hidden"
                  :class="{'!block':showDrawer}"
                />
              </div>
              <div class="" x-show="!darkMode">
                <img
                  src="../static/images/tiktok.png"
                  alt=""
                  class="hidden lg:block"
                  :class="{'!hidden':showDrawer}"
                />
                <img
                  src="../static/images/icon.png"
                  alt=""
                  class="block lg:hidden"
                  :class="{'!block':showDrawer}"
                />
              </div>
            </a>
          </div>

            <button
              @click="showDrawer=!showDrawer ; searchShow=true"

              </div>

                :class="{'!hidden':showDrawer}"

            </button>
            <div class="flex flex-col gap-1.5 py-3">
              <button id="home" class="button-nav dark:hover:!bg-neutral-800">
                <div class="size-8 fill-rose-500 flex-shrink-0">
                  <svg viewBox="0 0 48 48">
                    <path
                      d="M24.9505 7.84001C24.3975 7.38666 23.6014 7.38666 23.0485 7.84003L6.94846 21.04C6.45839 21.4418 6.2737 22.1083 6.48706 22.705C6.70041 23.3017 7.26576 23.7 7.89949 23.7H10.2311L11.4232 36.7278C11.5409 38.0149 12.6203 39 13.9128 39H21.5C22.0523 39 22.5 38.5523 22.5 38V28.3153C22.5 27.763 22.9477 27.3153 23.5 27.3153H24.5C25.0523 27.3153 25.5 27.763 25.5 28.3153V38C25.5 38.5523 25.9477 39 26.5 39H34.0874C35.3798 39 36.4592 38.0149 36.577 36.7278L37.7691 23.7H40.1001C40.7338 23.7 41.2992 23.3017 41.5125 22.705C41.7259 22.1082 41.5412 21.4418 41.0511 21.04L24.9505 7.84001Z"
                    ></path>
                  </svg>
                </div>
                <span
                  class="text-rose-500 whitespace-nowrap transition-duration-300"
                  :class="{'!opacity-0':showDrawer}"
                  >For You</span
                >
              </button>
              <button
                id="explore"
                class="button-nav dark:hover:!bg-neutral-800"
              >
                <div class="size-8 flex-shrink-0">
                  <svg viewBox="0 0 48 48">
                    <path
                      d="M24 37.4a13.4 13.4 0 1 0 0-26.8 13.4 13.4 0 0 0 0 26.8ZM40.5 24a16.5 16.5 0 1 1-33 0 16.5 16.5 0 0 1 33 0Z"
                    ></path>
                    <path

                    ></path>
                  </svg>
                </div>
                <span
                  class="whitespace-nowrap transition-all durtion-300"
                  :class="{'!opacity-0':showDrawer}"

                >
              </button>
              <button
                id="following"
                class="button-nav dark:hover:!bg-neutral-800"

                <div class="size-8 flex-shrink-0">
                  <svg class="scale-75" viewBox="0 0 48 48">
                    <path
                      d="M18.99 3a10 10 0 1 1 0 20 10 10 0 0 1 0-20Zm0 4a6 6 0 1 0 0 12.00A6 6 0 0 0 19 7ZM18.99 26c2.96 0 5.6.58 7.87 1.65l-3.07 3.06a15.38 15.38 0 0 0-4.8-.71C10.9 30 6.3 35.16 6 43c-.02.55-.46 1-1.02 1h-2c-.55 0-1-.45-.98-1C2.33 32.99 8.7 26 19 26ZM35.7 41.88 31.82 38H45a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1H31.82l3.88-3.88a1 1 0 0 0 0-1.41l-1.41-1.42a1 1 0 0 0-1.42 0l-7.3 7.3a2 2 0 0 0 0 2.82l7.3 7.3a1 1 0 0 0 1.42 0l1.41-1.42a1 1 0 0 0 0-1.41Z"

                    ></path>
                  </svg>
                </div>
                <span
                  class="whitespace-nowrap transition-all durtion-300"
                  :class="{'!opacity-0':showDrawer}"
                  >Friends</span
                >
              </button>
              <button id="upload" class="button-nav dark:hover:!bg-neutral-800">
                <div class="size-8 flex-shrink-0">
                  <svg class="scale-75" viewBox="0 0 48 48">
                    <path
                      d="M25 15a1 1 0 0 1 1 1v6h6a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-6v6a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-6h-6a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1h6v-6a1 1 0 0 1 1-1h2Z"
                    ></path>
                    <path
                      d="M33.58 4.5H14.42c-1.33 0-2.45 0-3.37.07-.95.08-1.86.25-2.73.7a7 7 0 0 0-3.06 3.05 7.14 7.14 0 0 0-.69 2.73 44.6 44.6 0 0 0-.07 3.37v19.16c0 1.33 0 2.45.07 3.37.08.95.25 1.86.7 2.73a7 7 0 0 0 3.05 3.06c.87.44 1.78.6 2.73.69.92.07 2.04.07 3.37.07h19.16c1.33 0 2.45 0 3.37-.07a7.14 7.14 0 0 0 2.73-.7 7 7 0 0 0 3.06-3.05c.44-.87.6-1.78.69-2.73.07-.92.07-2.04.07-3.37V14.42c0-1.33 0-2.45-.07-3.37a7.14 7.14 0 0 0-.7-2.73 7 7 0 0 0-3.05-3.06 7.14 7.14 0 0 0-2.73-.69 44.6 44.6 0 0 0-3.37-.07ZM10.14 8.83c.2-.1.53-.21 1.24-.27.73-.06 1.69-.06 3.12-.06h19c1.43 0 2.39 0 3.12.06a3.3 3.3 0 0 1 1.24.27 3 3 0 0 1 1.31 1.3c.1.21.21.54.27 1.25.06.73.06 1.69.06 3.12v19c0 1.43 0 2.39-.06 3.12a3.3 3.3 0 0 1-.27 1.24 3 3 0 0 1-1.3 1.31c-.21.1-.54.21-1.25.27-.73.06-1.69.06-3.12.06h-19c-1.43 0-2.39 0-3.12-.06a3.3 3.3 0 0 1-1.24-.27 3 3 0 0 1-1.31-1.3c-.1-.21-.21-.54-.27-1.25-.06-.73-.06-1.69-.06-3.12v-19c0-1.43 0-2.39.06-3.12a3.3 3.3 0 0 1 .27-1.24 3 3 0 0 1 1.3-1.31Z"
                    ></path>
                  </svg>
                </div>
                <span
                  class="whitespace-nowrap transition-all durtion-300"
                  :class="{'!opacity-0':showDrawer}"
                  >Upload</span
                >
              </button>
              <button
                id="activity"
                class="button-nav dark:hover:!bg-neutral-800"
              >
                <div class="size-8 flex-shrink-0">
                  <svg viewBox="0 0 32 32">
                    <path

                    ></path>
                  </svg>
                </div>
                <span
                  class="whitespace-nowrap transition-all durtion-300"
                  :class="{'!opacity-0':showDrawer}"
                  >activity</span
                >
              </button>
              <button
                id="messages"
                class="button-nav dark:hover:!bg-neutral-800"
              >
                <div class="size-8 flex-shrink-0">
                  <svg class="scale-75" viewBox="0 0 48 48">
                    <path
                      d="M2.18 9.67A2 2 0 0 1 4 8.5h40a2 2 0 0 1 1.74 3l-20 35a2 2 0 0 1-3.65-.4l-5.87-18.6L2.49 11.82a2 2 0 0 1-.31-2.15Zm18.2 17.72 4.15 13.15L40.55 12.5H8.41l9.98 11.41 11.71-7.2a1 1 0 0 1 1.38.32l1.04 1.7a1 1 0 0 1-.32 1.38L20.38 27.4Z"

                </div>
                <span
                  class="whitespace-nowrap transition-all durtion-300"
                  :class="{'!opacity-0':showDrawer}"
                  >Messages</span
                >
              </button>
              <button
                id="profile"
                class="button-nav dark:hover:!bg-neutral-800"
              >
                <div class="size-8 flex-shrink-0">
                  <div class="rounded-full size-7 overflow-hidden">
                    <img
                      src="../media/avatar.png"
                      class="w-full h-full object-cover object-center"
                    />
                  </div>
                </div>
                <span
                  class="whitespace-nowrap transition-all durtion-300"
                  :class="{'!opacity-0':showDrawer}"
                  >Profile</span
                >
              </button>
              <button id="more" class="button-nav dark:hover:!bg-neutral-800">

                  </svg>
                </div>

                  class="whitespace-nowrap transition-all durtion-300"
                  :class="{'!opacity-0':showDrawer}"
                  >More</span
                >
              </button>
            </div>
            <div
              class="py-4 border-t border-neutral-200 hidden dark:border-neutral-800 lg:block"
            >
              <p
                class="text-neutral-400 text-xs whitespace-nowrap transittion-all duration-300 dark:text-neutral-500"
                :class="{'!opacity-0' : showDrawer}"
              >
                &copy; 2026 TikTok
              </p>
            </div>
          </div>
        </nav>
        <side-drawer
          @click.outside="showDrawer=false, resetAll()"
          x-show="showDrawer"
          class="fixed left-18 top-0 w-80 h-full border-r border-l border-neutral-200 dark:border-neutral-800 dark:bg-black bg-white"
          x-transition:enter="transition duration-300 ease-out"
          x-transition:enter-start="translate-x-full opacity-0"
          x-transition:enter-end="translate-x-0 opacity-100"
          x-transition:leave="transition duration-200 ease-in"
          x-transition:leave-start="translate-x-0 opacity-100"
          x-transition:leave-end="-translate-x-full opacity-0"
        >
          <div class="px-2 py-5 relative" x-show="searchShow">
            <button
              id="close-button"
              class="bg-neutral-100 hover:bg-neutral-200 rounded-full absolute top-6 right-4 size-7 flex items-center justify-center cursor-pointer dark:bg-neutral-800 dark:hover:bg-neutral-700"
              @click="showDrawer = false; resetAll()"
            >
              <div class="size-4">
                <svg viewBox="0 0 48 48">
                  <path
                    d="M38.7 12.12a1 1 0 0 0 0-1.41l-1.4-1.42a1 1 0 0 0-1.42 0L24 21.17 12.12 9.3a1 1 0 0 0-1.41 0l-1.42 1.42a1 1 0 0 0 0 1.41L21.17 24 9.3 35.88a1 1 0 0 0 0 1.41l1.42 1.42a1 1 0 0 0 1.41 0L24 26.83 35.88 38.7a1 1 0 0 0 1.41 0l1.42-1.42a1 1 0 0 0 0-1.41L26.83 24 38.7 12.12Z"
                  ></path>
                </svg>
              </div>
            </button>

            <h2 class="pl-2 mb-7" :class="{'!opacity-0 ':showDrawer}">
              Search
            </h2>
            <div class="relative">
              <input
                x-model="searchQuery"
                type="search"
                name="search"
                id="search"
                placeholder="Search"
                class="w-full h-10 bg-neutral-100 rounded-full pl-4 text-xs text-neutral-700 focus:outline focus:outline-neutral-300 dark:bg-neutral-800 dark:text-white dark:focus:outline-neutral-600"
              />
              <button
                x-show="searchQuery"
                class="absolute top-3 right-4 cursor-pointer"
                @click="searchQuery=''"

                <div class="size-4 fill-neutral-400 dark:fil-neutral-500">

                    ></path>
                  </svg>
                </div>
              </button>
            </div>
          </div>
          <div class="px-2 py-5 relative" x-show="showMore">
            <button
              class="bg-neutral-100 hover:bg-neutral-200 rounded-full absolute top-6 right-4 size-7 flex items-center justify-center cursor-pointer"
              @click="showDrawer = false; resetAll()"
            >
              <div class="size-4 dark:fill-neutral-800">
                <svg viewBox="0 0 48 48">
                  <path
                    d="M38.7 12.12a1 1 0 0 0 0-1.41l-1.4-1.42a1 1 0 0 0-1.42 0L24 21.17 12.12 9.3a1 1 0 0 0-1.41 0l-1.42 1.42a1 1 0 0 0 0 1.41L21.17 24 9.3 35.88a1 1 0 0 0 0 1.41l1.42 1.42a1 1 0 0 0 1.41 0L24 26.83 35.88 38.7a1 1 0 0 0 1.41 0l1.42-1.42a1 1 0 0 0 0-1.41L26.83 24 38.7 12.12Z"
                  ></path>
                </svg>
              </div>

            <h1 class="pl-2 mb-7">More</h1>

              <li class="" id="">

                  class="button-rounded dark:hover:!bg-neutral-800"
                  id=""
                >

              </li>
              <li class="" id="">
                <button
                  type="button"
                  class="button-rounded dark:hover:!bg-neutral-800"
                  id=""
                >
                  <spn class="font-medium" id="">Log out</spn>
                  <div class="size-4 fill-neutral-400" id=""></div>
                </button>
              </li>
            </ul>
          </div>
          <div class="relative px-2 py-5" id="" x-show="showColorModes">
            <div class="flex items-center mb-7 pl-2">
              <button
                class="size-6 rounded-full bg-neutral-100 200 flex justify-center items-center cursor-pointer"
                @click="resetAll();showMore=true"
